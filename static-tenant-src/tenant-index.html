<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IDF Application</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #14120f;
        --paper-dim: #1b1916;
        --ink: #f0ebdf;
        --ink-dim: #a7a295;
        --ink-mid: #6a675f;
        --rule: #2a2721;
        --accent: #e08b57;
        --accent-bg: rgba(224, 139, 87, 0.08);
        --ok: #6fbf7f;
        --serif: 'Fraunces', Georgia, serif;
        --sans: 'Inter', system-ui, sans-serif;
        --mono: 'JetBrains Mono', ui-monospace, monospace;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: var(--paper);
        color: var(--ink);
        font-family: var(--sans);
        font-size: 15px;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
      }
      a {
        color: var(--accent);
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      code {
        font-family: var(--mono);
        font-size: 0.88em;
        background: var(--paper-dim);
        padding: 1px 6px;
        border-radius: 3px;
        color: var(--accent);
      }
      header {
        padding: 18px 48px;
        border-bottom: 1px solid var(--rule);
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        font-family: var(--mono);
        font-size: 11.5px;
        letter-spacing: 0.04em;
        color: var(--ink-dim);
      }
      header strong {
        color: var(--ink);
        letter-spacing: 0.08em;
      }
      main {
        max-width: 1000px;
        margin: 0 auto;
        padding: 56px 48px 120px;
      }
      .eyebrow {
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 14px;
      }
      h1 {
        font-family: var(--serif);
        font-weight: 500;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.05;
        letter-spacing: -0.02em;
        margin-bottom: 14px;
      }
      .lede {
        font-family: var(--serif);
        font-size: 1.15rem;
        line-height: 1.5;
        max-width: 680px;
        color: var(--ink-dim);
        margin-bottom: 48px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 0;
        border-top: 1px solid var(--rule);
        border-left: 1px solid var(--rule);
        margin-bottom: 32px;
      }
      .card {
        padding: 20px 24px;
        border-right: 1px solid var(--rule);
        border-bottom: 1px solid var(--rule);
      }
      .card .k {
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--ink-mid);
        margin-bottom: 10px;
      }
      .card .v {
        font-family: var(--serif);
        font-weight: 600;
        font-size: 2rem;
        color: var(--ink);
        line-height: 1;
        margin-bottom: 6px;
      }
      .card ul {
        list-style: none;
        padding: 0;
        margin: 8px 0 0 0;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--ink-dim);
      }
      .card li {
        padding: 2px 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      section {
        margin-top: 48px;
      }
      h2 {
        font-family: var(--serif);
        font-weight: 500;
        font-size: 1.4rem;
        margin-bottom: 8px;
      }
      .sect-meta {
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--ink-mid);
        margin-bottom: 10px;
      }
      .api-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-top: 8px;
      }
      .api-item {
        padding: 10px 14px;
        background: var(--paper-dim);
        border: 1px solid var(--rule);
        border-radius: 4px;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--ink-dim);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .api-item .method {
        color: var(--accent);
        font-weight: 600;
      }
      .api-item .path {
        color: var(--ink);
      }
      .entity {
        padding: 16px 20px;
        background: var(--paper-dim);
        border: 1px solid var(--rule);
        border-radius: 6px;
        margin-bottom: 12px;
      }
      .entity-name {
        font-family: var(--serif);
        font-weight: 600;
        font-size: 1.15rem;
        color: var(--ink);
      }
      .entity-fields {
        margin-top: 10px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 4px 16px;
        font-family: var(--mono);
        font-size: 12px;
      }
      .field {
        color: var(--ink-dim);
      }
      .field code {
        background: none;
        padding: 0;
        color: var(--ink);
      }
      .field .type {
        color: var(--accent);
      }
      .intent {
        padding: 6px 10px;
        background: var(--paper-dim);
        border: 1px solid var(--rule);
        border-radius: 3px;
        font-family: var(--mono);
        font-size: 12px;
        margin-bottom: 4px;
      }
      .intent .alpha {
        color: var(--accent);
      }
      .role {
        padding: 6px 10px;
        background: var(--paper-dim);
        border: 1px solid var(--rule);
        border-radius: 3px;
        font-family: var(--mono);
        font-size: 12px;
        margin-bottom: 4px;
      }
      .role .base {
        color: var(--accent);
      }
      .note {
        margin-top: 64px;
        padding: 20px 24px;
        background: var(--accent-bg);
        border: 1px solid var(--accent);
        border-radius: 6px;
        font-size: 13px;
        color: var(--ink);
      }
      .note .title {
        font-family: var(--mono);
        font-size: 10.5px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <header>
      <strong>IDF APP</strong>
      <span id="tenant-slug"></span>
    </header>
    <main id="root">loading…</main>

    <script>
      // Domain injected server-side (avoid XSS: escaped < в < in tenant-index.ts)
      const DOMAIN = __TENANT_DOMAIN_JSON__;
      const root = document.getElementById('root');
      const slugEl = document.getElementById('tenant-slug');
      slugEl.textContent = DOMAIN?.meta?.id || '';

      function esc(s) {
        return String(s ?? '').replace(/[&<>"']/g, (c) =>
          ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]),
        );
      }

      function render() {
        const entities = DOMAIN?.entities ?? DOMAIN?.ONTOLOGY?.entities ?? {};
        const intents = DOMAIN?.intents ?? DOMAIN?.INTENTS ?? {};
        const roles = DOMAIN?.roles ?? DOMAIN?.ONTOLOGY?.roles ?? {};
        const projections = DOMAIN?.projections ?? DOMAIN?.PROJECTIONS ?? {};
        const invariants = DOMAIN?.invariants ?? DOMAIN?.ONTOLOGY?.invariants ?? [];

        const entityNames = Object.keys(entities);
        const intentIds = Object.keys(intents);
        const roleIds = Object.keys(roles);
        const projIds = Object.keys(projections);

        const isEmpty =
          entityNames.length === 0 &&
          intentIds.length === 0 &&
          roleIds.length === 0;

        if (isEmpty) {
          root.innerHTML = `
            <div class="eyebrow">Приложение создаётся</div>
            <h1>Домен пока пустой</h1>
            <p class="lede">
              Владелец проекта ещё не опубликовал онтологию. После нажатия «Опубликовать»
              в IDF Studio — здесь появится структура приложения и API-endpoints.
            </p>
          `;
          return;
        }

        const desc = DOMAIN?.meta?.description || '';
        root.innerHTML = `
          <div class="eyebrow">Приложение готово</div>
          <h1>${esc(DOMAIN?.meta?.id || 'Tenant')}</h1>
          ${desc ? `<p class="lede">${esc(desc)}</p>` : ''}

          <div class="grid">
            <div class="card">
              <div class="k">Сущности</div>
              <div class="v">${entityNames.length}</div>
              <ul>${entityNames.slice(0, 6).map((n) => `<li>${esc(n)}</li>`).join('')}</ul>
            </div>
            <div class="card">
              <div class="k">Действия</div>
              <div class="v">${intentIds.length}</div>
              <ul>${intentIds.slice(0, 6).map((i) => `<li>${esc(i)}</li>`).join('')}</ul>
            </div>
            <div class="card">
              <div class="k">Роли</div>
              <div class="v">${roleIds.length}</div>
              <ul>${roleIds.slice(0, 6).map((r) => `<li>${esc(r)}</li>`).join('')}</ul>
            </div>
            <div class="card">
              <div class="k">Инварианты</div>
              <div class="v">${invariants.length}</div>
              ${
                projIds.length
                  ? `<ul><li style="color:var(--ink-mid)">${projIds.length} проекций</li></ul>`
                  : ''
              }
            </div>
          </div>

          ${
            entityNames.length
              ? `<section>
                  <div class="sect-meta">Схема</div>
                  <h2>Сущности</h2>
                  ${entityNames
                    .map((name) => {
                      const e = entities[name] || {};
                      const fields = e.fields || {};
                      const fieldEntries = Object.entries(fields);
                      return `
                        <div class="entity">
                          <div class="entity-name">${esc(name)}</div>
                          <div class="entity-fields">
                            ${fieldEntries
                              .map(
                                ([fn, fv]) =>
                                  `<div class="field"><code>${esc(fn)}</code>: <span class="type">${esc(
                                    typeof fv === 'object' && fv && fv.type
                                      ? String(fv.type)
                                      : JSON.stringify(fv),
                                  )}</span></div>`,
                              )
                              .join('')}
                          </div>
                        </div>
                      `;
                    })
                    .join('')}
                </section>`
              : ''
          }

          ${
            intentIds.length
              ? `<section>
                  <div class="sect-meta">Операции</div>
                  <h2>Действия</h2>
                  ${intentIds
                    .map((id) => {
                      const i = intents[id] || {};
                      return `<div class="intent"><span>${esc(id)}</span> · <span class="alpha">α=${esc(i['α'] || i.alpha || '?')}</span>${
                        i.target ? ` → ${esc(i.target)}` : ''
                      }</div>`;
                    })
                    .join('')}
                </section>`
              : ''
          }

          ${
            roleIds.length
              ? `<section>
                  <div class="sect-meta">Доступ</div>
                  <h2>Роли</h2>
                  ${roleIds
                    .map((r) => {
                      const role = roles[r] || {};
                      return `<div class="role"><b>${esc(r)}</b> · base=<span class="base">${esc(role.base || '?')}</span></div>`;
                    })
                    .join('')}
                </section>`
              : ''
          }

          <section>
            <div class="sect-meta">API</div>
            <h2>Интеграции</h2>
            <div class="api-list">
              <div class="api-item">
                <span class="method">GET</span>
                <span class="path">/health</span>
                <span>— проверка работоспособности</span>
              </div>
              ${projIds
                .slice(0, 5)
                .map(
                  (p) => `
                <div class="api-item">
                  <span class="method">GET</span>
                  <span class="path">/api/document/${esc(p)}?format=html|json</span>
                  <span>— документ по проекции «${esc(p)}»</span>
                </div>
                <div class="api-item">
                  <span class="method">GET</span>
                  <span class="path">/api/voice/${esc(p)}?format=plain|ssml</span>
                  <span>— голосовой скрипт</span>
                </div>`,
                )
                .join('')}
              <div class="api-item">
                <span class="method">POST</span>
                <span class="path">/api/agent/${esc(DOMAIN?.meta?.id || 'tenant')}/exec</span>
                <span>— агентский API (нужен JWT с agent-ролью)</span>
              </div>
            </div>
          </section>

          <div class="note">
            <div class="title">⓵ Раннее превью</div>
            <div>
              Это базовое представление структуры. Полный UI с формами и списками
              появится в ближайших итерациях — SDK-based frontend читает эту же
              <code>domain.json</code> и рендерит CRUD + canvases автоматически.
            </div>
          </div>
        `;
      }

      render();
    </script>
  </body>
</html>
