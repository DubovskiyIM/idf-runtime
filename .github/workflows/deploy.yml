name: Deploy

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Build, push & deploy
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout runtime
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # GHCR требует lowercase repository name. github.repository содержит
      # оригинальный case (DubovskiyIM/idf-runtime) → tag отклоняется.
      - name: Compute lowercase image tag
        id: image
        run: |
          repo_lc=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/$repo_lc" >> "$GITHUB_OUTPUT"

      # Frontend tenant'а собирается из public host repo (DubovskiyIM/idf).
      # Локально build-frontend.mjs делает rsync из ~/WebstormProjects/idf,
      # в CI заменяем на git clone — тот же result, но воспроизводимо.
      - name: Checkout idf host (public)
        uses: actions/checkout@v4
        with:
          repository: DubovskiyIM/idf
          path: .host-idf
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build host frontend
        run: |
          cd .host-idf
          npm ci --prefer-offline --no-audit
          npm run build
          cd ..
          rm -rf static
          mkdir -p static
          cp -R .host-idf/dist/. static/
          ls -la static/ | head

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          # commit SHA по которому buildx pushed свежую image — используем
          # для pull, т.к. GHCR `:latest` тэг не обновляется через
          # buildx + cache-from:gha (layers deduped → manifest :latest
          # остаётся на старом digest). SHA-tag всегда свежий.
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          envs: COMMIT_SHA
          # Итерация по всем tenant-директориям в /opt/idf-runtime/.
          # Legacy tenants с `image: idf-runtime:dev` (local tag) авто-migrate'ятся
          # на GHCR-reference через sed. Studio orchestrator теперь тоже генерит
          # compose с GHCR-ref — новые tenant'ы сразу правильные.
          script: |
            set -euo pipefail
            IMAGE_BY_SHA="ghcr.io/dubovskiyim/idf-runtime:${COMMIT_SHA}"
            IMAGE_REF="ghcr.io/dubovskiyim/idf-runtime:latest"

            # Фикс для сломанного GHCR `:latest` через buildx-cache:
            # pull by SHA (свежий по определению) → retag локально как :latest
            # и idf-runtime:dev. Studio orchestrator продолжает ссылаться на
            # `idf-runtime:dev` в tenant compose'ах → retag делает эти tenant'ы
            # актуальными без правки спец compose на VPS.
            echo "[deploy] pulling $IMAGE_BY_SHA"
            docker pull "$IMAGE_BY_SHA"
            docker tag "$IMAGE_BY_SHA" "$IMAGE_REF"
            docker tag "$IMAGE_BY_SHA" idf-runtime:dev
            echo "[deploy] retagged :latest и idf-runtime:dev → $COMMIT_SHA"

            updated=0
            skipped=0
            failed=0
            for dir in /opt/idf-runtime/*/; do
              [ -f "$dir/docker-compose.yml" ] || continue
              slug=$(basename "$dir")

              # Auto-migrate legacy `image: idf-runtime:dev` → GHCR ref.
              if grep -q '^    image: idf-runtime:dev$' "$dir/docker-compose.yml"; then
                echo "[$slug] migrate compose: idf-runtime:dev → $IMAGE_REF"
                sed -i "s|^    image: idf-runtime:dev$|    image: $IMAGE_REF|" "$dir/docker-compose.yml"
              fi

              # Tenant может использовать кастомный image (не наш GHCR) — пропускаем.
              if ! grep -q "$IMAGE_REF" "$dir/docker-compose.yml"; then
                echo "[$slug] skip (custom image)"
                skipped=$((skipped + 1))
                continue
              fi

              echo "[$slug] up -d --force-recreate"
              # Не pull'им — локальный retag уже указывает на свежую image.
              # --force-recreate гарантирует что контейнер пересоздаётся даже
              # если image digest тот же (compose умнее: с новой image auto,
              # но на retag уже-загруженной image пропустит, нам нужен force).
              if (cd "$dir" && docker compose up -d --force-recreate runtime); then
                updated=$((updated + 1))
              else
                failed=$((failed + 1))
                echo "[$slug] ERROR — продолжаем с остальными"
              fi
            done

            docker image prune -f

            echo "summary: updated=$updated skipped=$skipped failed=$failed"

            # Smoke на demo-tenant — canonical health endpoint
            echo "smoke-check demo..."
            sleep 3
            curl -fsS http://127.0.0.1:4001/health || curl -fsS https://demo.app.intent-design.tech/health

            # Exit non-zero если были failures
            [ "$failed" -eq 0 ]
